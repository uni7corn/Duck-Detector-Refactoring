name: Publish Latest GitHub Release

# This workflow is intentionally additive: nightly build/push logic stays in build.yml,
# while tagged/manual release publication lives here to keep release risk isolated.
on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing git tag to publish as a GitHub release
        required: true
        type: string
      release_name:
        description: Optional release title override
        required: false
        type: string

jobs:
  publish-release:
    if: github.event_name != 'push' || github.ref_name != 'nightly'
    runs-on: ubuntu-latest
    environment: Telegram
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release target
        id: release_target
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
            if [ -z "${tag_name}" ]; then
              echo "tag_name input is required for manual release publishing." >&2
              exit 1
            fi

            # Manual publishing syncs an existing git tag to GitHub Releases.
            # It never manufactures a new tag from the current branch head.
            if ! git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
              echo "Tag ${tag_name} does not exist in this repository." >&2
              exit 1
            fi

            git checkout --detach "refs/tags/${tag_name}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Read Android toolchain settings
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path

          properties = {}
          for raw_line in Path("gradle.properties").read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              properties[key.strip()] = value.strip()

          mapping = {
              "build_tools": "duckdetector.android.buildTools",
              "cmake": "duckdetector.android.cmake",
              "compile_sdk": "duckdetector.android.compileSdk",
              "compile_sdk_minor": "duckdetector.android.compileSdkMinor",
              "ndk": "duckdetector.android.ndk",
          }

          for output_name, property_name in mapping.items():
              value = properties.get(property_name)
              if not value:
                  raise SystemExit(f"Missing required Gradle property: {property_name}")
              print(f"{output_name}={value}")
          PY

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x gradlew

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android SDK packages
        shell: bash
        env:
          BUILD_TOOLS: ${{ steps.toolchain.outputs.build_tools }}
          CMAKE: ${{ steps.toolchain.outputs.cmake }}
          COMPILE_SDK: ${{ steps.toolchain.outputs.compile_sdk }}
          COMPILE_SDK_MINOR: ${{ steps.toolchain.outputs.compile_sdk_minor }}
          NDK: ${{ steps.toolchain.outputs.ndk }}
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${COMPILE_SDK}.${COMPILE_SDK_MINOR}" \
            "build-tools;${BUILD_TOOLS}" \
            "cmake;${CMAKE}" \
            "ndk;${NDK}"

      - name: Prepare release keystore
        id: keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            echo "Missing release signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD in the Telegram environment." >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/release.keystore"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "$keystore_path"
          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Extract expected signing fingerprint
        id: signing_fingerprint
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          keytool_output=$(keytool -list -v \
            -keystore "${ANDROID_KEYSTORE_PATH}" \
            -storepass "${ANDROID_KEYSTORE_PASSWORD}" \
            -alias "${ANDROID_KEY_ALIAS}")

          expected_sha256=$(printf '%s\n' "${keytool_output}" \
            | sed -n 's/^[[:space:]]*SHA256:[[:space:]]*//p' \
            | head -n 1 \
            | tr -d '[:space:]:' \
            | tr '[:upper:]' '[:lower:]')

          owner_line=$(printf '%s\n' "${keytool_output}" \
            | sed -n 's/^Owner: //p' \
            | head -n 1)

          signer_name=$(OWNER_LINE="${owner_line}" python3 - <<'PY'
          import os
          import re

          owner = os.environ.get("OWNER_LINE", "").strip()
          if not owner:
              print("Unknown signer", end="")
              raise SystemExit(0)

          match = re.search(r"(?:^|,\s*)CN=([^,]+)", owner)
          if match:
              print(match.group(1).strip(), end="")
          else:
              print(owner, end="")
          PY
          )

          if [ -z "${expected_sha256}" ]; then
            echo "Failed to extract SHA-256 fingerprint from the configured keystore." >&2
            exit 1
          fi

          echo "sha256=${expected_sha256}" >> "$GITHUB_OUTPUT"
          echo "signer_name=${signer_name}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        id: build
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          start_time=$(date +%s)
          build_time_utc=$(date -u +%Y%m%d%H%M%S)
          ./gradlew \
            -Pduckdetector.buildTimeUtc="${build_time_utc}" \
            -Pduckdetector.teeCrl.refresh=true \
            :app:assembleRelease
          end_time=$(date +%s)

          duration_seconds=$((end_time - start_time))
          duration_minutes=$((duration_seconds / 60))
          duration_remainder=$((duration_seconds % 60))

          printf -v duration_human "%dm %02ds" "$duration_minutes" "$duration_remainder"

          echo "duration_human=$duration_human" >> "$GITHUB_OUTPUT"

      - name: Collect release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          metadata_json=$(python3 - <<'PY'
          import json
          from pathlib import Path

          metadata_candidates = [
              Path("app/build/outputs/apk/release/output-metadata.json"),
              Path("app/release/output-metadata.json"),
          ]
          metadata_path = next((path for path in metadata_candidates if path.exists()), None)
          if metadata_path is None:
              raise SystemExit("Release output-metadata.json not found in app/release or app/build/outputs/apk/release.")

          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          elements = metadata.get("elements") or []
          apk_elements = [element for element in elements if element.get("outputFile", "").endswith(".apk")]
          if not apk_elements:
              raise SystemExit("No APK files were listed in output-metadata.json.")

          universal_elements = [
              element for element in apk_elements
              if (element.get("type") or "").upper() == "UNIVERSAL"
              or element.get("outputFile", "").endswith("-Universal.apk")
          ]

          if len(universal_elements) == 1:
              selected_element = universal_elements[0]
          elif len(apk_elements) == 1:
              selected_element = apk_elements[0]
          else:
              listed_outputs = ", ".join(sorted(element.get("outputFile", "<missing outputFile>") for element in apk_elements))
              raise SystemExit(f"Expected a single release APK entry, found {len(apk_elements)}: {listed_outputs}")

          apk_path = metadata_path.parent / selected_element["outputFile"]
          if not apk_path.exists():
              raise SystemExit(f"Release APK not found at {apk_path}.")

          payload = {
              "apk_path": str(apk_path),
              "apk_name": apk_path.name,
              "version_name": selected_element.get("versionName") or "unknown",
              "version_code": str(selected_element.get("versionCode") or "unknown"),
          }
          print(json.dumps(payload))
          PY
          )

          apk_path=$(METADATA_JSON="${metadata_json}" python3 - <<'PY'
          import json
          import os
          print(json.loads(os.environ["METADATA_JSON"])["apk_path"], end="")
          PY
          )

          apk_name=$(METADATA_JSON="${metadata_json}" python3 - <<'PY'
          import json
          import os
          print(json.loads(os.environ["METADATA_JSON"])["apk_name"], end="")
          PY
          )

          version_name=$(METADATA_JSON="${metadata_json}" python3 - <<'PY'
          import json
          import os
          print(json.loads(os.environ["METADATA_JSON"])["version_name"], end="")
          PY
          )

          version_code=$(METADATA_JSON="${metadata_json}" python3 - <<'PY'
          import json
          import os
          print(json.loads(os.environ["METADATA_JSON"])["version_code"], end="")
          PY
          )

          {
            echo "apk_path=$apk_path"
            echo "apk_name=$apk_name"
            echo "version_name=$version_name"
            echo "version_code=$version_code"
          } >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        shell: bash
        env:
          APK_PATH: ${{ steps.metadata.outputs.apk_path }}
          BUILD_TOOLS: ${{ steps.toolchain.outputs.build_tools }}
          EXPECTED_SIGNER_SHA256: ${{ steps.signing_fingerprint.outputs.sha256 }}
        run: |
          set -euo pipefail

          apksigner_output=$("${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner" verify --print-certs "${APK_PATH}")
          actual_sha256=$(APKSIGNER_OUTPUT="${apksigner_output}" python3 - <<'PY'
          import os

          output = os.environ.get("APKSIGNER_OUTPUT", "")
          marker = "certificate SHA-256 digest:"
          for raw_line in output.splitlines():
              if marker not in raw_line or "Source Stamp" in raw_line:
                  continue
              digest = raw_line.split(marker, 1)[1].replace(":", "").strip().lower()
              if digest:
                  print(digest, end="")
                  break
          PY
          )

          if [ -z "${actual_sha256}" ] || [ "${actual_sha256}" != "${EXPECTED_SIGNER_SHA256}" ]; then
            echo "APK was not signed with the expected certificate." >&2
            exit 1
          fi

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          TAG_NAME: ${{ steps.release_target.outputs.tag_name }}
          VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          release_name="${INPUT_RELEASE_NAME}"
          if [ -z "${release_name}" ]; then
            release_name="Duck Detector ${VERSION_NAME}"
          fi

          {
            echo "release_name=$release_name"
            echo "prerelease=false"
            echo "make_latest=true"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release commit metadata
        id: release_commit
        shell: bash
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Prepare release note
        shell: bash
        env:
          TAG_NAME: ${{ steps.release_target.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
          VERSION_CODE: ${{ steps.metadata.outputs.version_code }}
          APK_NAME: ${{ steps.metadata.outputs.apk_name }}
          BUILD_DURATION: ${{ steps.build.outputs.duration_human }}
          SIGNER_NAME: ${{ steps.signing_fingerprint.outputs.signer_name }}
          RELEASE_SHA: ${{ steps.release_commit.outputs.sha }}
          RELEASE_SHORT_SHA: ${{ steps.release_commit.outputs.short_sha }}
        run: |
          cat <<EOF > github-release-note.md
          ${RELEASE_NAME}

          Tag: ${TAG_NAME}
          Version: ${VERSION_NAME} (${VERSION_CODE})
          APK: ${APK_NAME}
          Commit: ${RELEASE_SHA} (${RELEASE_SHORT_SHA})
          Build time: ${BUILD_DURATION}
          Signature: verified by ${SIGNER_NAME}
          EOF

      - name: Upload release artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.metadata.outputs.apk_name }}
          path: ${{ steps.metadata.outputs.apk_path }}
          if-no-files-found: error

      - name: Publish latest GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_target.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          body_path: github-release-note.md
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          overwrite_files: true
          files: |
            ${{ steps.metadata.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
