name: Build APK And Push To Telegram

on:
  push:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Telegram
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read Android toolchain settings
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path

          properties = {}
          for raw_line in Path("gradle.properties").read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              properties[key.strip()] = value.strip()

          mapping = {
              "build_tools": "duckdetector.android.buildTools",
              "cmake": "duckdetector.android.cmake",
              "compile_sdk": "duckdetector.android.compileSdk",
              "compile_sdk_minor": "duckdetector.android.compileSdkMinor",
              "ndk": "duckdetector.android.ndk",
          }

          for output_name, property_name in mapping.items():
              value = properties.get(property_name)
              if not value:
                  raise SystemExit(f"Missing required Gradle property: {property_name}")
              print(f"{output_name}={value}")
          PY

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x gradlew

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android SDK packages
        shell: bash
        env:
          BUILD_TOOLS: ${{ steps.toolchain.outputs.build_tools }}
          CMAKE: ${{ steps.toolchain.outputs.cmake }}
          COMPILE_SDK: ${{ steps.toolchain.outputs.compile_sdk }}
          COMPILE_SDK_MINOR: ${{ steps.toolchain.outputs.compile_sdk_minor }}
          NDK: ${{ steps.toolchain.outputs.ndk }}
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${COMPILE_SDK}.${COMPILE_SDK_MINOR}" \
            "build-tools;${BUILD_TOOLS}" \
            "cmake;${CMAKE}" \
            "ndk;${NDK}"

      - name: Prepare release keystore
        id: keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            echo "Missing release signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD in the Telegram environment." >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/release.keystore"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "$keystore_path"
          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Extract expected signing fingerprint
        id: signing_fingerprint
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          keytool_output=$(keytool -list -v \
            -keystore "${ANDROID_KEYSTORE_PATH}" \
            -storepass "${ANDROID_KEYSTORE_PASSWORD}" \
            -alias "${ANDROID_KEY_ALIAS}")

          expected_sha256=$(printf '%s\n' "${keytool_output}" \
            | sed -n 's/^[[:space:]]*SHA256:[[:space:]]*//p' \
            | head -n 1 \
            | tr -d '[:space:]:' \
            | tr '[:upper:]' '[:lower:]')

          owner_line=$(printf '%s\n' "${keytool_output}" \
            | sed -n 's/^Owner: //p' \
            | head -n 1)

          signer_name=$(OWNER_LINE="${owner_line}" python3 - <<'PY'
          import os
          import re

          owner = os.environ.get("OWNER_LINE", "").strip()
          if not owner:
              print("Unknown signer", end="")
              raise SystemExit(0)

          match = re.search(r"(?:^|,\s*)CN=([^,]+)", owner)
          if match:
              print(match.group(1).strip(), end="")
          else:
              print(owner, end="")
          PY
          )

          if [ -z "${expected_sha256}" ]; then
            echo "Failed to extract SHA-256 fingerprint from the configured keystore." >&2
            exit 1
          fi

          echo "sha256=${expected_sha256}" >> "$GITHUB_OUTPUT"
          echo "signer_name=${signer_name}" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        id: build
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          start_time=$(date +%s)
          build_time_utc=$(date -u +%Y%m%d%H%M%S)
          ./gradlew \
            -Pduckdetector.buildTimeUtc="${build_time_utc}" \
            -Pduckdetector.teeCrl.refresh=true \
            :app:assembleRelease
          end_time=$(date +%s)

          duration_seconds=$((end_time - start_time))
          duration_minutes=$((duration_seconds / 60))
          duration_remainder=$((duration_seconds % 60))

          printf -v duration_human "%dm %02ds" "$duration_minutes" "$duration_remainder"

          echo "duration_seconds=$duration_seconds" >> "$GITHUB_OUTPUT"
          echo "duration_human=$duration_human" >> "$GITHUB_OUTPUT"

      - name: Collect artifact metadata
        id: metadata
        shell: bash
        env:
          DURATION_HUMAN: ${{ steps.build.outputs.duration_human }}
          GIT_BRANCH: ${{ github.ref_name }}
          SIGNER_NAME: ${{ steps.signing_fingerprint.outputs.signer_name }}
        run: |
          set -euo pipefail

          metadata_json=$(python3 - <<'PY'
          import json
          from pathlib import Path

          metadata_candidates = [
              Path("app/build/outputs/apk/release/output-metadata.json"),
              Path("app/release/output-metadata.json"),
          ]
          metadata_path = next((path for path in metadata_candidates if path.exists()), None)
          if metadata_path is None:
              raise SystemExit(
                  "Release output-metadata.json not found in app/release or app/build/outputs/apk/release."
              )

          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          elements = metadata.get("elements") or []
          if not elements:
              raise SystemExit("No APK entries found in output-metadata.json.")

          apk_elements = [
              element for element in elements
              if element.get("outputFile", "").endswith(".apk")
          ]
          if not apk_elements:
              raise SystemExit("No APK files were listed in output-metadata.json.")

          universal_elements = [
              element for element in apk_elements
              if (element.get("type") or "").upper() == "UNIVERSAL"
              or element.get("outputFile", "").endswith("-Universal.apk")
          ]

          if len(universal_elements) == 1:
              selected_element = universal_elements[0]
          elif len(apk_elements) == 1:
              selected_element = apk_elements[0]
          else:
              listed_outputs = ", ".join(
                  sorted(element.get("outputFile", "<missing outputFile>") for element in apk_elements)
              )
              raise SystemExit(
                  f"Expected a single release APK entry, found {len(apk_elements)}: {listed_outputs}"
              )

          apk_path = metadata_path.parent / selected_element["outputFile"]
          if not apk_path.exists():
              raise SystemExit(f"Release APK not found at {apk_path}.")

          payload = {
              "apk_path": str(apk_path),
              "apk_name": apk_path.name,
              "version_name": selected_element.get("versionName") or "unknown",
              "version_code": str(selected_element.get("versionCode") or "unknown"),
          }
          print(json.dumps(payload))
          PY
          )

          if [ -z "$metadata_json" ]; then
            echo "Release APK not found." >&2
            exit 1
          fi

          commit_subject=$(git log -1 --pretty=%s)
          commit_author=$(git log -1 --pretty=%an)
          commit_body=$(git log -1 --pretty=%b)
          git_hash=$(git rev-parse --short=8 HEAD)
          caption=$(METADATA_JSON="${metadata_json}" COMMIT_SUBJECT="${commit_subject}" COMMIT_BODY="${commit_body}" COMMIT_AUTHOR="${commit_author}" DURATION_HUMAN="${DURATION_HUMAN}" GIT_BRANCH="${GIT_BRANCH}" GIT_HASH="${git_hash}" SIGNER_NAME="${SIGNER_NAME}" python3 - <<'PY'
          import json
          import os

          metadata = json.loads(os.environ["METADATA_JSON"])
          commit_subject = os.environ["COMMIT_SUBJECT"]
          commit_body = os.environ["COMMIT_BODY"]
          commit_author = os.environ["COMMIT_AUTHOR"]
          duration_human = os.environ["DURATION_HUMAN"]
          git_branch = os.environ["GIT_BRANCH"]
          git_hash = os.environ["GIT_HASH"]
          signer_name = os.environ["SIGNER_NAME"] or "Unknown signer"

          def first_paragraph(text: str) -> str:
              paragraphs = []
              current = []
              for raw_line in text.splitlines():
                  line = raw_line.strip()
                  if not line:
                      if current:
                          paragraphs.append(" ".join(current))
                          current = []
                      continue
                  current.append(line)
              if current:
                  paragraphs.append(" ".join(current))
              return paragraphs[0] if paragraphs else ""

          summary = first_paragraph(commit_body)

          def escape_html(text: str) -> str:
              return (
                  text.replace("&", "&amp;")
                  .replace("<", "&lt;")
                  .replace(">", "&gt;")
              )

          def render(subject: str, summary_text: str) -> str:
              commit_block_lines = [subject]
              if summary_text:
                  commit_block_lines.extend(["", summary_text])

              commit_block = escape_html("\n".join(commit_block_lines))

              lines = [
                  f"Version: <b>{escape_html(metadata['version_name'])} ({escape_html(metadata['version_code'])})</b>",
                  f"APK: <b>{escape_html(metadata['apk_name'])}</b>",
                  "Commit:",
                  f"<pre>{commit_block}</pre>",
                  f"Author: <b>{escape_html(commit_author)}</b>",
                  f"Branch: <b>{escape_html(git_branch)}@{escape_html(git_hash)}</b>",
                  f"Build time: <b>{escape_html(duration_human)}</b>",
                  f"Signature: <b>verified : by {escape_html(signer_name)}</b>",
              ]
              return "\n".join(lines)

          def truncate(text: str, limit: int) -> str:
              if limit <= 0:
                  return ""
              if len(text) <= limit:
                  return text
              if limit <= 3:
                  return text[:limit]
              return text[: limit - 3].rstrip() + "..."

          max_caption_length = 1024

          caption = render(commit_subject, summary)
          if len(caption) > max_caption_length and summary:
              without_summary = render(commit_subject, "")
              summary_budget = max_caption_length - len(without_summary) - 2
              summary = truncate(summary, summary_budget)
              caption = render(commit_subject, summary)

          if len(caption) > max_caption_length:
              base_without_subject = render("", summary)
              subject_budget = max_caption_length - len(base_without_subject)
              if subject_budget < 1:
                  raise SystemExit("Telegram caption template exceeds the 1024 character limit.")
              commit_subject = truncate(commit_subject, subject_budget)
              caption = render(commit_subject, summary)

          print(caption, end="")
          PY
          )

          apk_path=$(METADATA_JSON="${metadata_json}" python3 - <<'PY'
          import json
          import os

          metadata = json.loads(os.environ["METADATA_JSON"])
          print(metadata["apk_path"], end="")
          PY
          )

          apk_name=$(METADATA_JSON="${metadata_json}" python3 - <<'PY'
          import json
          import os

          metadata = json.loads(os.environ["METADATA_JSON"])
          print(metadata["apk_name"], end="")
          PY
          )

          {
            echo "apk_path=$apk_path"
            echo "apk_name=$apk_name"
            delimiter="CAPTION_$(date +%s)_$$"
            echo "caption<<${delimiter}"
            printf '%s\n' "$caption"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        shell: bash
        env:
          APK_PATH: ${{ steps.metadata.outputs.apk_path }}
          BUILD_TOOLS: ${{ steps.toolchain.outputs.build_tools }}
          EXPECTED_SIGNER_SHA256: ${{ steps.signing_fingerprint.outputs.sha256 }}
        run: |
          set -euo pipefail

          apksigner_output=$("${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner" verify --print-certs "${APK_PATH}")
          printf '%s\n' "${apksigner_output}"

          actual_sha256=$(APKSIGNER_OUTPUT="${apksigner_output}" python3 - <<'PY'
          import os

          output = os.environ.get("APKSIGNER_OUTPUT", "")
          marker = "certificate SHA-256 digest:"
          for raw_line in output.splitlines():
              if marker not in raw_line or "Source Stamp" in raw_line:
                  continue
              digest = raw_line.split(marker, 1)[1].replace(":", "").strip().lower()
              if digest:
                  print(digest, end="")
                  break
          PY
          )

          if [ -z "${actual_sha256}" ]; then
            echo "Failed to extract the APK signer SHA-256 digest." >&2
            exit 1
          fi

          if [ "${actual_sha256}" != "${EXPECTED_SIGNER_SHA256}" ]; then
            echo "APK was not signed with the expected certificate." >&2
            echo "Expected: ${EXPECTED_SIGNER_SHA256}" >&2
            echo "Actual:   ${actual_sha256}" >&2
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.metadata.outputs.apk_name }}
          path: ${{ steps.metadata.outputs.apk_path }}
          if-no-files-found: error

      - name: Prepare release asset
        id: release_asset
        run: |
          echo "asset_path=${{ steps.metadata.outputs.apk_path }}" >> "$GITHUB_OUTPUT"

      - name: Delete old Nightly assets
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "Find nightly release..."
          RELEASE_JSON=$(gh api repos/$OWNER/$REPO/releases/tags/nightly 2>/dev/null || true)
          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "Nightly release doesn't exist, skip deletion"
            exit 0
          fi
          echo "Release ID: $RELEASE_ID"
          echo "Get and delete all old assets (paginated)..."
          ASSET_IDS=$(gh api --paginate repos/$OWNER/$REPO/releases/$RELEASE_ID/assets --jq '.[].id')
          for ASSET_ID in $ASSET_IDS; do
            echo "Delete asset $ASSET_ID"
            gh api -X DELETE repos/$OWNER/$REPO/releases/assets/$ASSET_ID
          done

      - name: Prepare nightly release note
        if: github.ref_name == 'main' || github.ref_name == 'master'
        shell: bash
        run: |
          cat <<EOF > nightly-release-note.md
          Nightly APK build

          Commit: ${GITHUB_SHA}
          Branch: ${GITHUB_REF_NAME}
          EOF

      - name: Update nightly APK release
        id: nightly_release
        uses: softprops/action-gh-release@v2
        if: github.ref_name == 'main' || github.ref_name == 'master'
        with:
          tag_name: nightly
          name: Nightly APK Build
          body_path: nightly-release-note.md
          prerelease: false
          overwrite_files: true
          files: |
            ${{ steps.release_asset.outputs.asset_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python dependency for QQ push
        if: github.ref_name == 'main' || github.ref_name == 'master'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user websockets

      - name: Push APK to QQ group via WS
        if: github.ref_name == 'main' || github.ref_name == 'master'
        continue-on-error: true
        shell: bash
        env:
          ONEBOT_WS_URL: ${{ vars.ONEBOT_WS_URL }}
          QQ_GROUP_IDS: ${{ vars.QQ_GROUP_IDS }}
          BUILD_CAPTION_HTML: ${{ steps.metadata.outputs.caption }}
          APK_NAME: ${{ steps.metadata.outputs.apk_name }}
          APK_PUBLIC_URL: ${{ fromJSON(steps.nightly_release.outputs.assets)[0].browser_download_url }}
        run: |
          python3 - <<'PY'
          import asyncio
          import json
          import os
          import random
          import re
          import sys
          import time
          import uuid
          from html import unescape
          from typing import Final, List, Dict, Any, Optional

          from websockets.asyncio.client import connect
          from websockets.exceptions import ConnectionClosed

          ws_url: Final[str] = os.environ["ONEBOT_WS_URL"]

          group_ids: Final[List[int]] = [
              int(x)
              for x in re.split(r"[,\s]+", os.environ["QQ_GROUP_IDS"].strip())
              if x
          ]

          caption_html: Final[str] = os.environ["BUILD_CAPTION_HTML"]
          apk_name: Final[str] = os.environ["APK_NAME"]
          apk_public_url: Final[str] = os.environ["APK_PUBLIC_URL"]

          CONCURRENCY: Final[int] = int(os.getenv("ONEBOT_CONCURRENCY", "3"))
          ACTION_RETRY: Final[int] = int(os.getenv("ONEBOT_ACTION_RETRY", "2"))
          
          CONNECT_RETRY: Final[int] = int(os.getenv("ONEBOT_CONNECT_RETRY", "8"))
          
          CONNECT_TIMEOUT: Final[float] = float(os.getenv("ONEBOT_CONNECT_TIMEOUT", "15"))
          
          CONNECT_BACKOFF_BASE: Final[float] = float(os.getenv("ONEBOT_CONNECT_BACKOFF_BASE", "3"))
          CONNECT_BACKOFF_MAX: Final[float] = float(os.getenv("ONEBOT_CONNECT_BACKOFF_MAX", "60"))
          
          DELAY_BETWEEN_ACTIONS: Final[float] = float(os.getenv("ONEBOT_DELAY_BETWEEN_ACTIONS", "0.3"))
          
          FAIL_ON_NOTIFY_ERROR: Final[bool] = (
              os.getenv("FAIL_ON_NOTIFY_ERROR", "false").strip().lower()
              in {"1", "true", "yes", "on"}
          )

          ws_lock = asyncio.Lock()

          def html_to_plain_text(text: str) -> str:
              text = re.sub(r"<br\s*/?>", "\n", text)
              text = text.replace("</pre>", "\n").replace("<pre>", "")
              text = text.replace("</b>", "").replace("<b>", "")
              text = re.sub(r"<[^>]+>", "", text)
              text = unescape(text)
              text = re.sub(r"\n{3,}", "\n\n", text).strip()
              return text

          def log(msg: str) -> None:
              print(msg, flush=True)
          
          
          def calc_backoff(attempt: int) -> float:
              delay = min(CONNECT_BACKOFF_MAX, CONNECT_BACKOFF_BASE * (2 ** attempt))
              jitter = random.uniform(0, min(1.5, delay * 0.2))
              return delay + jitter

          async def call_api(
              ws: Any,
              action: str,
              params: Dict[str, Any],
          ) -> Dict[str, Any]:
              echo: str = str(uuid.uuid4())
              payload: Dict[str, Any] = {
                  "action": action,
                  "params": params,
                  "echo": echo,
              }
          
              async with ws_lock:
                  await ws.send(json.dumps(payload, ensure_ascii=False))
          
                  while True:
                      raw = await ws.recv()
                      data: Dict[str, Any] = json.loads(raw)
          
                      if data.get("echo") != echo:
                          # OneBot 可能推送事件消息，这里忽略非当前 echo 的消息。
                          continue
          
                      if data.get("status") != "ok":
                          raise RuntimeError(f"{action} failed: {data}")
          
                      return data

          async def download_apk(ws: Any) -> str:
              resp: Dict[str, Any] = await call_api(ws, "download_file", {
                  "url": apk_public_url,
                  "thread_count": 1,
                  "headers": [],
              })

              data: Dict[str, Any] = resp.get("data") or {}

              local_path: Optional[str] = (
                  data.get("file")
                  or data.get("path")
                  or data.get("file_path")
              )

              if not local_path:
                  raise RuntimeError(f"No file path returned: {resp}")
          
              return local_path

          async def send_to_group(
              ws: Any,
              group_id: int,
              plain_caption: str,
              local_path: str,
          ) -> bool:
              for attempt in range(ACTION_RETRY + 1):
                  try:
                      await call_api(ws, "send_group_msg", {
                          "group_id": group_id,
                          "message": plain_caption,
                      })

                      await asyncio.sleep(DELAY_BETWEEN_ACTIONS)

                      await call_api(ws, "upload_group_file", {
                          "group_id": group_id,
                          "file": local_path,
                          "name": apk_name,
                      })

                      log(f"[OK] group {group_id}")
                      return True

                  except (OSError, TimeoutError, ConnectionClosed, asyncio.TimeoutError):
                      raise

                  except Exception as e:
                      log(f"[WARN] group {group_id} attempt {attempt + 1}/{ACTION_RETRY + 1} failed: {e}")

                      if attempt >= ACTION_RETRY:
                          log(f"[FAIL] group {group_id}")
                          return False

                      await asyncio.sleep(1 + attempt)

              return False

          async def run_once() -> bool:
              plain_caption: str = html_to_plain_text(caption_html)
          
              async with connect(
                  ws_url,
                  ping_interval=20,
                  ping_timeout=20,
                  open_timeout=CONNECT_TIMEOUT,
              ) as ws:
                  log("[INFO] Connected to OneBot WebSocket")

                  local_path: str = await download_apk(ws)
                  log(f"[INFO] APK downloaded by OneBot: {local_path}")
          
                  sem = asyncio.Semaphore(CONCURRENCY)
          
                  async def worker(group_id: int) -> bool:
                      async with sem:
                          return await send_to_group(ws, group_id, plain_caption, local_path)
          
                  results = await asyncio.gather(*(worker(gid) for gid in group_ids))
                  ok_count = sum(1 for x in results if x)

                  log(f"[INFO] Push result: {ok_count}/{len(group_ids)} groups succeeded")
          
                  return all(results)
          
          
          async def main() -> int:
              start = time.monotonic()
          
              for attempt in range(CONNECT_RETRY + 1):
                  try:
                      success = await run_once()
          
                      if success:
                          log("[INFO] OneBot notification finished successfully")
                          return 0
          
                      msg = "[WARN] OneBot connected, but one or more group pushes failed"
                      if FAIL_ON_NOTIFY_ERROR:
                          log(msg)
                          return 1
          
                      log(msg + "; ignored because FAIL_ON_NOTIFY_ERROR=false")
                      return 0
          
                  except (OSError, TimeoutError, ConnectionClosed, asyncio.TimeoutError) as e:
                      log(
                          f"[WARN] OneBot connection/session attempt "
                          f"{attempt + 1}/{CONNECT_RETRY + 1} failed: {type(e).__name__}: {e}"
                      )
          
                      if attempt >= CONNECT_RETRY:
                          msg = (
                              "[WARN] OneBot notification skipped after retries. "
                              "This is treated as non-fatal because FAIL_ON_NOTIFY_ERROR=false."
                          )
          
                          if FAIL_ON_NOTIFY_ERROR:
                              log("[ERROR] OneBot notification failed after retries")
                              return 1
          
                          log(msg)
                          return 0
          
                      delay = calc_backoff(attempt)
                      log(f"[INFO] Retry OneBot connection in {delay:.1f}s")
                      await asyncio.sleep(delay)
          
                  except Exception as e:
                      log(f"[ERROR] Unexpected OneBot notification error: {type(e).__name__}: {e}")
          
                      if FAIL_ON_NOTIFY_ERROR:
                          return 1
          
                      log("[WARN] Ignored unexpected OneBot notification error because FAIL_ON_NOTIFY_ERROR=false")
                      return 0
          
              elapsed = time.monotonic() - start
              log(f"[INFO] Finished in {elapsed:.1f}s")
              return 0

          if __name__ == "__main__":
              sys.exit(asyncio.run(main()))
          PY

      - name: Push APK to Telegram channel
        shell: bash
        env:
          APK_PATH: ${{ steps.metadata.outputs.apk_path }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CAPTION: ${{ steps.metadata.outputs.caption }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Missing Telegram secrets. Configure TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in the Telegram environment." >&2
            exit 1
          fi

          response_file=$(mktemp)
          http_code=$(curl --silent --show-error --output "${response_file}" --write-out "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${APK_PATH}" \
            -F "parse_mode=HTML" \
            --form-string "caption=${TELEGRAM_CAPTION}")

          if [ "${http_code}" != "200" ]; then
            echo "Telegram API returned HTTP ${http_code}." >&2
            cat "${response_file}" >&2
            exit 1
          fi

          RESPONSE_FILE="${response_file}" python3 - <<'PY'
          import json
          import os
          import sys

          response_path = os.environ["RESPONSE_FILE"]
          with open(response_path, "r", encoding="utf-8") as fh:
              payload = json.load(fh)

          if not payload.get("ok"):
              description = payload.get("description", "Telegram API returned ok=false")
              raise SystemExit(description)

          result = payload.get("result") or {}
          message_id = result.get("message_id")
          if message_id is None:
              raise SystemExit("Telegram API succeeded but did not return a message_id.")

          print(f"Telegram message_id: {message_id}")
          PY
